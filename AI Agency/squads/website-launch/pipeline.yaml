id: website-launch
steps:
  - id: normalize-brief
    type: intake
    agent: orchestrator
    output: artifacts/brief.md
  - id: define-structure
    type: agent
    agent: strategy
    output: artifacts/sitemap.md
  - id: write-copy
    type: agent
    agent: copy
    output: artifacts/copy-deck.md
  - id: create-layout
    type: agent
    agent: design
    output: artifacts/wireframe.md
  - id: build-site
    type: agent
    agent: web
    output: artifacts/implementation-notes.md
  - id: final-review
    type: qa
    agent: qa
    output: artifacts/review.md
